<!DOCTYPE html>
<html>
<head>
 <link rel="stylesheet" href="style.css">


</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<div class="sales-form">

    <h2>Sales Record</h2>

    <!-- Date -->
    <input type="date" id="date">

    <!-- Shift -->
    <select id="shift">
        <option value="">Select Shift</option>
        <option>Morning</option>
        <option>Afternoon</option>
        <option>Night</option>
    </select>

    <!-- Employee -->
    <select id="employee">
        <option value="">Select Employee</option>
        <option>Anna</option>
        <option>John</option>
        <option>Lisa</option>
    </select>

    <!-- Product -->
    <select id="product"></select>

    <!-- Price (auto filled) -->
    <input type="text" id="price" placeholder="Price" readonly>

    <!-- Quantity -->
    <input type="number" id="qty" placeholder="Quantity" min="1">

    <!-- Submit -->
<button onclick="saveSale()">Save Sale</button>



</div>
<script type="module" src="./main.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvIRQOFXY3NCBB-60fgI8Kh_19LIo2lt8",
  authDomain: "store-86724.firebaseapp.com",
  projectId: "store-86724"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Make db global
window.db = db;

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


</script>
<script>
async function sendToCloud(record){

    try {
        await addDoc(collection(window.db, "sales"), record);

        alert("✅ Saved to Firebase");
    } catch (error) {
        console.error(error);
        alert("❌ Error saving data");
    }

}
</script>
<script>

let products = [];

// Load JSON
fetch('./products.json')
.then(res => res.json())
.then(data => {
    products = data.products;

    const productSelect = document.getElementById('product');

    products.forEach(p => {
        let option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.name;
        productSelect.appendChild(option);
    });
});

// Auto fill price
document.getElementById('product').addEventListener('change', function(){
    const selected = products.find(p => p.id == this.value);
    document.getElementById('price').value = selected.price;
});

// Save record
function saveSale(){

    const price = parseFloat(document.getElementById('price').value);
    const qty = parseInt(document.getElementById('qty').value);

    const record = {
        date: document.getElementById('date').value,
        shift: document.getElementById('shift').value,
        employee: document.getElementById('employee').value,
        productName: document.getElementById('product').selectedOptions[0].text,
        price: price,
        quantity: qty,
        total: price * qty,
        createdAt: new Date()
    };

    sendToCloud(record);
}
</script>

</body>
</html>
